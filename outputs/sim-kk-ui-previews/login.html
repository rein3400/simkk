<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SIM-KK â€” Login Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/tailwind-built.css">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #F5F1EA; color: #0F0F0F; }
  .font-display { font-family: 'Fraunces', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  @keyframes reveal { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { animation: reveal 720ms cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  .reveal-delay-1 { animation-delay: 100ms; }
  .reveal-delay-2 { animation-delay: 200ms; }
  .reveal-delay-3 { animation-delay: 300ms; }
</style>
</head>
<body class="min-h-screen grid grid-cols-1 md:grid-cols-2 bg-cream">
  <section class="relative hidden md:flex flex-col justify-end p-24 overflow-hidden">
    <div class="absolute inset-0">
      <img src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9?w=1200&q=80" alt="" class="w-full h-full object-cover opacity-30" />
      <div class="absolute inset-0 bg-gradient-to-br from-cream/90 via-cream/60 to-cream/90"></div>
    </div>
    <div class="relative max-w-xl reveal">
      <span class="inline-flex items-center gap-2 font-mono text-caption uppercase text-forest font-bold">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.9 5.9h6.1l-4.9 3.6 1.9 5.9L12 14.8 6.9 18.4l1.9-5.9L4 8.9h6.1L12 3z"/></svg>
        Operasional klinik
      </span>
      <h1 class="mt-4 font-display italic text-display-2xl text-ink leading-none reveal reveal-delay-1">SIM-KK</h1>
      <p class="mt-6 font-body text-body-lg text-graphite leading-snug max-w-md reveal reveal-delay-2">
        Sistem klinik kecantikan untuk kasir, rekam medis, inventaris FIFO, dan laporan manajer.
      </p>
      <div class="mt-8 flex flex-wrap gap-2 reveal reveal-delay-3">
        <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone bg-cream/80 font-body text-body-sm">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1F3D36" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
          Komisi terkunci saat Lunas
        </span>
        <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone bg-cream/80 font-body text-body-sm">
          Rekam medis ramah tablet
        </span>
        <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-stone bg-cream/80 font-body text-body-sm">
          Export PDF/XLSX
        </span>
      </div>
    </div>
  </section>

  <section class="flex flex-col justify-center px-8 md:px-16 py-24">
    <div class="max-w-md w-full mx-auto reveal reveal-delay-1">
      <span class="font-mono text-caption uppercase text-forest font-bold">Akses pengguna</span>
      <h2 class="mt-3 font-display text-display-md text-ink leading-none">Masuk</h2>

      <div class="mt-12 space-y-8">
        <label class="block">
          <span class="font-mono text-caption uppercase text-sage">Username</span>
          <input id="username" value="kasir" class="mt-2 w-full bg-transparent border-0 border-b border-stone focus:border-forest focus:outline-none py-2 font-body text-body-lg" />
        </label>

        <label class="block">
          <span class="font-mono text-caption uppercase text-sage">Password</span>
          <div class="relative mt-2">
            <input id="password" type="password" value="simkk-2026" class="w-full bg-transparent border-0 border-b border-stone focus:border-forest focus:outline-none py-2 font-body text-body-lg pr-8" />
            <button type="button" onclick="document.getElementById('password').type = document.getElementById('password').type === 'password' ? 'text' : 'password'" class="absolute right-0 top-1/2 -translate-y-1/2 text-sage hover:text-ink">
              <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </label>

        <div>
          <span class="font-mono text-caption uppercase text-sage">Role demo</span>
          <div class="mt-3 flex flex-wrap gap-2" id="role-chips">
            <button type="button" data-role="Kasir" class="role-chip px-4 py-2 rounded-full font-body text-body-sm font-semibold transition-all duration-480 ease-editorial bg-ink text-cream">Kasir</button>
            <button type="button" data-role="Terapis" class="role-chip px-4 py-2 rounded-full font-body text-body-sm font-semibold border border-stone text-sage hover:bg-parchment transition-all duration-480 ease-editorial">Terapis</button>
            <button type="button" data-role="Gudang" class="role-chip px-4 py-2 rounded-full font-body text-body-sm font-semibold border border-stone text-sage hover:bg-parchment transition-all duration-480 ease-editorial">Gudang</button>
            <button type="button" data-role="Manajer" class="role-chip px-4 py-2 rounded-full font-body text-body-sm font-semibold border border-stone text-sage hover:bg-parchment transition-all duration-480 ease-editorial">Manajer</button>
          </div>
          <p class="mt-3 font-body text-body-sm text-forest font-semibold" id="role-hint">Akses penuh POS, Rekam Medis, Gudang, dan Laporan.</p>
        </div>

        <button type="button" class="w-full inline-flex items-center justify-center gap-2 px-6 py-4 border-2 border-ink text-ink font-body text-base font-bold hover:bg-ink hover:text-cream transition-all duration-480 ease-editorial">
          Masuk
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <script>
    const hints = {
      Kasir: 'Akses POS untuk transaksi, komisi terapis, dan struk.',
      Terapis: 'Akses Rekam Medis untuk catatan treatment dan foto Before/After.',
      Gudang: 'Akses Gudang untuk stok, pembelian supplier, dan FIFO.',
      Manajer: 'Akses penuh POS, Rekam Medis, Gudang, dan Laporan.',
    };
    const usernames = { Kasir: 'kasir', Terapis: 'terapis', Gudang: 'gudang', Manajer: 'manajer' };
    document.querySelectorAll('.role-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.role-chip').forEach((c) => {
          c.classList.remove('bg-ink', 'text-cream');
          c.classList.add('border', 'border-stone', 'text-sage', 'hover:bg-parchment');
        });
        chip.classList.add('bg-ink', 'text-cream');
        chip.classList.remove('border', 'border-stone', 'text-sage', 'hover:bg-parchment');
        const role = chip.dataset.role;
        document.getElementById('role-hint').textContent = hints[role];
        document.getElementById('username').value = usernames[role];
      });
    });
  </script>
</body>
</html>
