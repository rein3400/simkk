name: test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # 1. Fast SQLite test suite (Laravel default, no external services).
  # ---------------------------------------------------------------------------
  test-sqlite-fast:
    name: "PHPUnit (SQLite in-memory)"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, gd, zip
          coverage: none
          tools: composer

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            apps/api/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.json', 'apps/api/composer.lock') }}
          restore-keys: |
            composer-${{ runner.os }}-

      - name: Install PHP dependencies
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare SQLite test database
        working-directory: apps/api
        run: |
          mkdir -p database
          touch database/database.sqlite
          cp -n .env.example .env || true
          php artisan key:generate --force

      - name: Run PHPUnit
        working-directory: apps/api
        run: php artisan test

  # ---------------------------------------------------------------------------
  # 2. D1 local test suite (Workers D1 bindings via wrangler, no deploy).
  # ---------------------------------------------------------------------------
  test-d1-local:
    name: "PHPUnit (D1 local via wrangler)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, gd, zip
          coverage: none
          tools: composer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.composer/cache/files
            apps/api/vendor
          key: composer-d1-${{ runner.os }}-${{ hashFiles('apps/api/composer.json', 'apps/api/composer.lock') }}
          restore-keys: |
            composer-d1-${{ runner.os }}-

      - name: Install PHP dependencies
        working-directory: apps/api
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Apply D1 migrations (local)
        working-directory: apps/api
        run: wrangler d1 migrations apply simkk --local

      - name: Run PHPUnit (d1-local suite)
        working-directory: apps/api
        run: php artisan test --testsuite=d1-local

  # ---------------------------------------------------------------------------
  # 3. Web smoke (Playwright) for static HTML previews.
  # ---------------------------------------------------------------------------
  web-smoke:
    name: "Playwright smoke (static previews)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Node dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build (type-check)
        working-directory: apps/web
        run: npm run build

      - name: Install Playwright browser
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke (static previews)
        working-directory: apps/web
        run: npm run test:smoke:previews

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-previews-report
          path: |
            apps/web/test-results
            apps/web/playwright-report
          retention-days: 7
