# SIM-KK nginx site config (v12 — rewrite to strip /api prefix properly)
# Place: /etc/nginx/sites-available/sim-kk

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Vue SPA static assets
    location /assets/ {
        alias /var/www/sim-kk/apps/web/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA: index
    location = / {
        root /var/www/sim-kk/apps/web/dist;
        try_files /index.html =404;
    }

    # API: rewrite /api/* to /* for file resolution
    location ^~ /api {
        root /var/www/sim-kk/apps/api/public;
        index index.php;

        # Strip /api prefix from $uri so file lookup hits public/dbg.php not public/api/dbg.php
        rewrite ^/api(.*)$ $1 break;

        try_files $uri $uri/ /index.php$is_args$args;

        location = /index.php {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # Vue SPA: catch-all
    location / {
        root /var/www/sim-kk/apps/web/dist;
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
