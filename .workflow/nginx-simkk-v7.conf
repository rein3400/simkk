# SIM-KK nginx site config (v7 — strict location priority, /api/ MUST match)
# Place: /etc/nginx/sites-available/sim-kk
# Enable: ln -s /etc/nginx/sites-available/sim-kk /etc/nginx/sites-enabled/

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Vue SPA: assets path
    location /assets/ {
        alias /var/www/sim-kk/apps/web/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA: root index.html
    location = / {
        root /var/www/sim-kk/apps/web/dist;
        try_files /index.html =404;
    }

    # Vue SPA: SPA history fallback (any non-asset, non-api, non-php URL)
    # Specific prefixes for routes like /monitor, /pos, etc.
    location / {
        root /var/www/sim-kk/apps/web/dist;
        try_files $uri /index.html;
    }

    # API: ALL /api/* goes to Laravel index.php
    # Use exact match style with $uri/ append slash
    location ^~ /api {
        root /var/www/sim-kk/apps/api/public;
        index index.php;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # PHP files in /api/ (catch .php directly)
    location ~ \.php$ {
        deny all;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    # Uptime Kuma (deferred - Docker not installed)
    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
