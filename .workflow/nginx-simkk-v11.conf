# SIM-KK nginx site config (v11 — use $realpath_root correctly with alias)
# Place: /etc/nginx/sites-available/sim-kk

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Vue SPA static assets
    location /assets/ {
        alias /var/www/sim-kk/apps/web/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA: index
    location = / {
        root /var/www/sim-kk/apps/web/dist;
        try_files /index.html =404;
    }

    # API: /api/* → Laravel public dir
    # Use root (not alias) to avoid prefix-doubling issue
    # $uri = /api/login → file check /var/www/sim-kk/apps/api/public/api/login (WRONG, has /api doubled)
    #
    # Use REWRITE that updates $uri but also ensures the script resolves correctly
    # Approach: do a full rewrite to /index.php for non-PHP requests
    # This is the standard Laravel nginx config pattern
    location ^~ /api {
        root /var/www/sim-kk/apps/api/public;
        index index.php;

        # First try: actual .php file in this dir (Laravel doesn't have any public .php except index.php)
        # Second try: rewrite all to /index.php?$args
        try_files $uri $uri/ /index.php$is_args$args;

        # Capture and pass index.php via FPM
        location = /index.php {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }

        # Direct .php access
        location ~ \.php$ {
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # Vue SPA: catch-all
    location / {
        root /var/www/sim-kk/apps/web/dist;
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
