# SIM-KK nginx site config (v18 — error_page fallback to FPM)
# Place: /etc/nginx/sites-available/sim-kk

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 20M;
    client_body_timeout 60s;

    # === API location: alias + 404 -> @laravel fallback ===
    location /api {
        alias /var/www/sim-kk/apps/api/public;
        index index.php;

        # If file not found in alias, fall through to FPM via @laravel named location
        try_files $uri $uri/ @laravel;

        # Direct .php execution
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # Named location: hand off to FPM with absolute SCRIPT_FILENAME
    location @laravel {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/sim-kk/apps/api/public/index.php;
        fastcgi_read_timeout 60s;
        fastcgi_hide_header X-Powered-By;
    }

    # === Vue SPA: catch-all ===
    root /var/www/sim-kk/apps/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        alias /var/www/sim-kk/apps/web/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~ /\. {
        deny all;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
