# SIM-KK nginx site config (v10 — fix alias path doubling)
# Place: /etc/nginx/sites-available/sim-kk

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Vue SPA static assets
    location /assets/ {
        alias /var/www/sim-kk/apps/web/dist/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Vue SPA: index
    location = / {
        root /var/www/sim-kk/apps/web/dist;
        try_files /index.html =404;
    }

    # API: /api/* → Laravel public dir
    # Use $uri stripped of /api prefix to avoid alias doubling
    location ^~ /api {
        root /var/www/sim-kk/apps/api/public;
        index index.php;

        # $uri here is /api/login, $realpath_root = /var/www/sim-kk/apps/api/public
        # For $uri=/api/login, file check is $realpath_root/$uri = /var/www/sim-kk/apps/api/public/api/login (WRONG)
        # Solution: use a named capture group in regex location
        # OR strip prefix in fastcgi
        # Easiest: rewrite to remove /api prefix
        rewrite ^/api(/.*)$ $1 break;

        # After rewrite $uri becomes /login, $realpath_root/public/login still wrong because $realpath_root is unchanged
        # Use root directive resolution: $uri = /login → file = /var/www/sim-kk/apps/api/public/login (correct)

        try_files $uri /index.php$is_args$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/run/php/php8.3-fpm.sock;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            fastcgi_read_timeout 60s;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # Vue SPA: catch-all
    location / {
        root /var/www/sim-kk/apps/web/dist;
        try_files $uri /index.html;
    }

    location ~ /\. {
        deny all;
    }

    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}
