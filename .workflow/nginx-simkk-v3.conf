# SIM-KK nginx site config (v3 — simplified, fix 403 deny rule)
# Place: /etc/nginx/sites-available/sim-kk
# Enable: ln -s /etc/nginx/sites-available/sim-kk /etc/nginx/sites-enabled/

# Default server: catch-all for IP-based + sim-kk.example.id domain
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/sim-kk/apps/web/dist;
    index index.html;

    # Serve Vue SPA static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy to PHP-FPM
    location /api/ {
        root /var/www/sim-kk/apps/api/public;
        try_files $uri /index.php?$query_string;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Reject any direct .php file access in Vue dist (security)
    location ~ \.php$ {
        deny all;
    }

    # Static assets from Vue build
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Uptime Kuma monitor (reverse proxy to localhost:3001)
    location /monitor/ {
        proxy_pass http://127.0.0.1:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Block hidden files (files starting with .)
    location ~ /\. {
        deny all;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20M;
    client_body_timeout 60s;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
}

# API subdomain block (untuk saat domain live + DNS A record api.${domain})
server {
    listen 80;
    server_name api.sim-kk.example.id;

    client_max_body_size 20M;
    client_body_timeout 60s;

    root /var/www/sim-kk/apps/api/public;
    index index.php;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60s;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
